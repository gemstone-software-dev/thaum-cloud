# Build Sphinx HTML and publish to the gh-pages branch (site root).
#
# Trigger manually: Actions → Publish documentation → Run workflow.
#
# After the first successful run, enable GitHub Pages (Settings → Pages):
#   Source: Deploy from a branch → gh-pages → / (root).
#
# Requires: contents: write (default GITHUB_TOKEN when workflow permissions allow).

name: Publish documentation

on:
  workflow_dispatch:

concurrency:
  group: publish-docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: doc/sphinx_config/requirements.txt

      - name: Install doc dependencies
        run: pip install -r doc/sphinx_config/requirements.txt

      - name: Build HTML docs
        run: make -C doc/sphinx_config html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: doc/sphinx_config/_build/html
          enable_jekyll: false
